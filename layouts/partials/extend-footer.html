<script>
(function () {
  // ===== 星空 + 鼠标拖尾粒子系统 =====
  var canvas = document.createElement('canvas');
  canvas.id = 'qianjiao-stars';
  canvas.style.cssText = [
    'position:fixed',
    'top:0', 'left:0',
    'width:100vw', 'height:100vh',
    'pointer-events:none',
    'z-index:9999',
    'opacity:0.22',
    'mix-blend-mode:screen'
  ].join(';');
  document.body.appendChild(canvas);

  var ctx = canvas.getContext('2d');
  var W, H, stars = [], trail = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function mkStar() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.3 + 0.25,
      vy: -(Math.random() * 0.18 + 0.04),
      phase: Math.random() * Math.PI * 2,
      freq: Math.random() * 0.012 + 0.004
    };
  }

  function initStars() {
    stars = [];
    var n = Math.min(Math.floor(W * H / 5500), 220);
    for (var i = 0; i < n; i++) stars.push(mkStar());
  }

  // 鼠标跟随
  document.addEventListener('mousemove', function (e) {
    for (var i = 0; i < 3; i++) {
      trail.push({
        x:  e.clientX + (Math.random() - 0.5) * 14,
        y:  e.clientY + (Math.random() - 0.5) * 14,
        vx: (Math.random() - 0.5) * 1.3,
        vy: (Math.random() - 0.5) * 1.3 - 0.5,
        life: 1.0,
        r:   Math.random() * 2.2 + 0.6,
        gold: Math.random() > 0.38
      });
    }
  });

  function draw() {
    ctx.clearRect(0, 0, W, H);
    var t = Date.now() * 0.001;

    // 星星
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      s.y += s.vy;
      if (s.y < -3) { s.y = H + 3; s.x = Math.random() * W; }
      var a = 0.45 + 0.5 * Math.sin(t * s.freq * 60 + s.phase);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, 6.283);
      ctx.fillStyle = 'rgba(210,228,255,' + a + ')';
      ctx.fill();
    }

    // 拖尾
    for (var j = trail.length - 1; j >= 0; j--) {
      var p = trail[j];
      p.x += p.vx; p.y += p.vy; p.life -= 0.026;
      if (p.life <= 0) { trail.splice(j, 1); continue; }
      var col = p.gold ? '255,205,70' : '120,195,255';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, 6.283);
      ctx.fillStyle = 'rgba(' + col + ',' + (p.life * 0.85) + ')';
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  resize(); initStars(); draw();
  window.addEventListener('resize', function () { resize(); initStars(); });
})();
</script>
